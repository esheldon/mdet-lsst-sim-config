mls:
    shear: 0.02
    randomize_shear: false

sim:

    coadd_dim: 350
    buff: 50

    bands: ["r", "i", "z"]
    gal_type: wldeblend
    psf_type: moffat

    # factor of 2 * 3 to get to expected 0.03 per visit
    # times 2 for early LSST
    # 1 / sqrt(15) for year 1 ish
    psf_variation_factor: 1.55
    # early LSST
    psf_fwhm: 1.0

mdet:
    deblender: "scarlet"
    metacal:
        reconv_type: "fitgauss"

coadd:
    nowarp: true
