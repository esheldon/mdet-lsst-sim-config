mls:
    shear: 0.02
    randomize_shear: false

sim:

    coadd_dim: 350
    buff: 50

    bands: ["r", "i", "z"]

    gal:
        type: "wldeblend"

    psf:
        type: "gmix"
        model: "turb"
        dim: 51
        nepoch: 15
        max_nongauss_frac: 0.005
        fwhm_fac: 1.0

    # "no_pixel" is required for gmix
    draw_method: "auto"

mdet:
    deblender: "scarlet"
    metacal:
        reconv_type: "fitgauss"

coadd:
    nowarp: true
