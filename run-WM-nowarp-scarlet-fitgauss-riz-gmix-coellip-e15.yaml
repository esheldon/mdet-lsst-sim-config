# same as run-WM-nowarp-scarlet-fitgauss-riz-gmix-coellip-e15.yaml
# but used coellip5
mls:
    shear: 0.02
    randomize_shear: false

sim:

    coadd_dim: 350
    buff: 50

    bands: ["r", "i", "z"]

    gal:
        type: "wldeblend"

    psf:
        type: "gmix"
        dim: 51
        nepoch: 15
        max_nongauss_frac: 0.005

    # "no_pixel" is required for gmix
    draw_method: "no_pixel"

mdet:
    deblender: "scarlet"
    metacal:
        reconv_type: "fitgauss"

coadd:
    nowarp: true
