mls:
    shear: 0.02
    randomize_shear: false

sim:

    coadd_dim: 350
    buff: 50

    bands: ["r", "i", "z"]
    gal_type: wldeblend
    psf_type: moffat

    # factor of 3 to get to expected 0.03 per visit
    # 1 / sqrt(15) for year 1 ish
    psf_variation_factor: 0.77

    psf_fwhm: 0.8

mdet:
    deblender: "scarlet"
    metacal:
        reconv_type: "fitgauss"

coadd:
    nowarp: true
